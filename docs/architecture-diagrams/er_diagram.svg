<svg width="1400" height="750" viewBox="0 0 1400 750" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1400" height="750" fill="white"/>
  <!-- outer border -->
  <rect x="15" y="15" width="1370" height="720" rx="5" fill="white" stroke="#BBBBBB" stroke-width="1.2"/>
  <!-- diagram label -->
  <text x="36" y="44" font-size="13" fill="#888" font-style="italic">erd AIVP_ERD</text>

  <!-- ════════════════════════════════════════════════
       ENTITY RECTANGLES
  ════════════════════════════════════════════════ -->

  <!-- User -->
  <rect x="60"   y="160" width="160" height="60" rx="5" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.8"/>
  <text x="140"  y="196" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#333">User</text>

  <!-- Combo -->
  <rect x="440"  y="160" width="160" height="60" rx="5" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.8"/>
  <text x="520"  y="196" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#333">Combo</text>

  <!-- ComboItem -->
  <rect x="820"  y="160" width="175" height="60" rx="5" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.8"/>
  <text x="907"  y="196" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#333">ComboItem</text>

  <!-- LoraModel -->
  <rect x="1150" y="160" width="175" height="60" rx="5" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.8"/>
  <text x="1237" y="196" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#333">LoraModel</text>

  <!-- RunLog -->
  <rect x="440"  y="490" width="160" height="60" rx="5" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.8"/>
  <text x="520"  y="526" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#333">RunLog</text>

  <!-- ════════════════════════════════════════════════
       RELATIONSHIP DIAMONDS
  ════════════════════════════════════════════════ -->

  <!-- owns: between User(right=220) and Combo(left=440), center x=330 -->
  <polygon points="330,190  370,210  330,230  290,210" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.5"/>
  <text x="330" y="215" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">owns</text>

  <!-- has: between Combo(right=600) and ComboItem(left=820), center x=710 -->
  <polygon points="710,190  750,210  710,230  670,210" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.5"/>
  <text x="710" y="215" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">has</text>

  <!-- logs: below User, center x=330, y=490 -->
  <polygon points="330,470  370,490  330,510  290,490" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.5"/>
  <text x="330" y="494" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">logs</text>

  <!-- ════════════════════════════════════════════════
       RELATIONSHIP LINES
  ════════════════════════════════════════════════ -->

  <!-- User right → owns left -->
  <line x1="220" y1="190" x2="290" y2="210" stroke="#888" stroke-width="1.2"/>
  <text x="248" y="194" font-size="11" fill="#555">1</text>

  <!-- owns right → Combo left -->
  <line x1="370" y1="210" x2="440" y2="190" stroke="#888" stroke-width="1.2"/>
  <text x="392" y="194" font-size="11" fill="#555">1..*</text>

  <!-- Combo right → has left -->
  <line x1="600" y1="190" x2="670" y2="210" stroke="#888" stroke-width="1.2"/>
  <text x="622" y="194" font-size="11" fill="#555">1</text>

  <!-- has right → ComboItem left -->
  <line x1="750" y1="210" x2="820" y2="190" stroke="#888" stroke-width="1.2"/>
  <text x="772" y="194" font-size="11" fill="#555">1..*</text>

  <!-- refers to: ComboItem top → up → across → LoraModel top (clean T-shape) -->
  <line x1="907"  y1="160" x2="907"  y2="110" stroke="#888" stroke-width="1.2"/>
  <line x1="907"  y1="110" x2="1237" y2="110" stroke="#888" stroke-width="1.2"/>
  <line x1="1237" y1="110" x2="1237" y2="160" stroke="#888" stroke-width="1.2"/>
  <text x="1072" y="100" text-anchor="middle" font-size="12" fill="#777" font-style="italic">refers to</text>
  <text x="918"  y="142" font-size="11" fill="#555">0..*</text>
  <text x="1210" y="142" font-size="11" fill="#555">1</text>

  <!-- logs: User bottom → straight down → turn right → logs diamond left -->
  <line x1="140" y1="220" x2="140" y2="490" stroke="#888" stroke-width="1.2"/>
  <line x1="140" y1="490" x2="290" y2="490" stroke="#888" stroke-width="1.2"/>
  <text x="160" y="484" font-size="11" fill="#555">1</text>

  <!-- logs diamond right → turn → RunLog top-left -->
  <line x1="370" y1="490" x2="440" y2="510" stroke="#888" stroke-width="1.2"/>
  <text x="380" y="506" font-size="11" fill="#555">0..*</text>

  <!-- ════════════════════════════════════════════════
       ATTRIBUTE ELLIPSES — User
  ════════════════════════════════════════════════ -->
  <line x1="100" y1="220" x2="88"  y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="82" cy="352" rx="34" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="82" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333" text-decoration="underline">id</text>

  <line x1="140" y1="220" x2="170" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="180" cy="352" rx="40" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="180" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">email</text>

  <line x1="200" y1="220" x2="278" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="290" cy="352" rx="50" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="290" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">password</text>

  <!-- ════════════════════════════════════════════════
       ATTRIBUTE ELLIPSES — Combo
  ════════════════════════════════════════════════ -->
  <line x1="490" y1="220" x2="472" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="466" cy="352" rx="34" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="466" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333" text-decoration="underline">id</text>

  <line x1="550" y1="220" x2="574" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="580" cy="352" rx="40" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="580" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">name</text>

  <!-- ════════════════════════════════════════════════
       ATTRIBUTE ELLIPSES — ComboItem
  ════════════════════════════════════════════════ -->
  <line x1="855" y1="220" x2="826" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="818" cy="352" rx="34" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="818" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333" text-decoration="underline">id</text>

  <line x1="907" y1="220" x2="920" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="928" cy="352" rx="42" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="928" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">weight</text>

  <line x1="960" y1="220" x2="1018" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="1030" cy="352" rx="50" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="1030" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">slot_index</text>

  <!-- ════════════════════════════════════════════════
       ATTRIBUTE ELLIPSES — LoraModel
  ════════════════════════════════════════════════ -->
  <line x1="1185" y1="220" x2="1162" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="1154" cy="352" rx="34" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="1154" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333" text-decoration="underline">id</text>

  <line x1="1237" y1="220" x2="1250" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="1258" cy="352" rx="40" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="1258" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">name</text>

  <line x1="1290" y1="220" x2="1334" y2="330" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="1342" cy="352" rx="48" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="1342" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">category</text>

  <!-- ════════════════════════════════════════════════
       ATTRIBUTE ELLIPSES — RunLog
  ════════════════════════════════════════════════ -->
  <line x1="480" y1="550" x2="452" y2="640" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="444" cy="664" rx="34" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="444" y="668" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333" text-decoration="underline">id</text>

  <line x1="520" y1="550" x2="534" y2="640" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="542" cy="664" rx="52" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="542" y="668" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">timestamp</text>

  <line x1="570" y1="550" x2="618" y2="640" stroke="#888" stroke-width="0.9"/>
  <ellipse cx="632" cy="664" rx="56" ry="24" fill="#FDF5E6" stroke="#C9A64C" stroke-width="1.2"/>
  <text x="632" y="668" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">config_json</text>

</svg>
