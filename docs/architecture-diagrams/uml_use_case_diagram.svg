<svg width="800" height="780" viewBox="0 0 800 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="780" fill="white"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">uc AIVP_UCD</text>

  <!-- System boundary box -->
  <rect x="180" y="50" width="560" height="710" rx="10" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="220" y="72" font-size="12" fill="#888" font-style="italic">AIVP System</text>

  <!-- ── USE CASE ELLIPSES ── -->

  <!-- Register / Login -->
  <ellipse cx="430" cy="115" rx="120" ry="28" fill="#D6EAF8" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="430" y="119" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A5276">Register / Login</text>

  <!-- Configure Run -->
  <ellipse cx="390" cy="210" rx="115" ry="28" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.2"/>
  <text x="390" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#145A32">Configure run</text>

  <!-- Select Output Format (include) -->
  <ellipse cx="600" cy="290" rx="110" ry="26" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="600" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#145A32">Select output format</text>

  <!-- Save / Download Output -->
  <ellipse cx="390" cy="370" rx="125" ry="28" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.2"/>
  <text x="390" y="374" text-anchor="middle" font-size="13" font-weight="bold" fill="#145A32">Save / download output</text>

  <!-- Save Combo Template -->
  <ellipse cx="390" cy="455" rx="125" ry="28" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.2"/>
  <text x="390" y="459" text-anchor="middle" font-size="13" font-weight="bold" fill="#145A32">Save combo template</text>

  <!-- View Run History -->
  <ellipse cx="390" cy="540" rx="125" ry="28" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.2"/>
  <text x="390" y="544" text-anchor="middle" font-size="13" font-weight="bold" fill="#145A32">View run history</text>

  <!-- Add LoRA Model -->
  <ellipse cx="590" cy="620" rx="105" ry="26" fill="#FADBD8" stroke="#C0392B" stroke-width="1.2"/>
  <text x="590" y="624" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B241C">Add LoRA model</text>

  <!-- Edit LoRA Model -->
  <ellipse cx="590" cy="685" rx="105" ry="26" fill="#FADBD8" stroke="#C0392B" stroke-width="1.2"/>
  <text x="590" y="689" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B241C">Edit LoRA model</text>

  <!-- Delete LoRA Model -->
  <ellipse cx="590" cy="750" rx="105" ry="26" fill="#FADBD8" stroke="#C0392B" stroke-width="1.2"/>
  <text x="590" y="754" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B241C">Delete LoRA model</text>

  <!-- ── ACTOR: User ── -->
  <circle cx="70" cy="105" r="18" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="123" x2="70" y2="160" stroke="#555" stroke-width="1.5"/>
  <line x1="44" y1="140" x2="96" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="160" x2="50" y2="185" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="160" x2="90" y2="185" stroke="#555" stroke-width="1.5"/>
  <text x="70" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">User</text>

  <!-- ── ACTOR: Operator ── -->
  <circle cx="70" cy="380" r="18" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="398" x2="70" y2="435" stroke="#555" stroke-width="1.5"/>
  <line x1="44" y1="415" x2="96" y2="415" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="435" x2="50" y2="460" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="435" x2="90" y2="460" stroke="#555" stroke-width="1.5"/>
  <text x="70" y="476" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Operator</text>

  <!-- ── ACTOR: Admin ── -->
  <circle cx="70" cy="685" r="18" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="703" x2="70" y2="740" stroke="#555" stroke-width="1.5"/>
  <line x1="44" y1="720" x2="96" y2="720" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="740" x2="50" y2="765" stroke="#555" stroke-width="1.5"/>
  <line x1="70" y1="740" x2="90" y2="765" stroke="#555" stroke-width="1.5"/>
  <text x="70" y="775" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Admin</text>

  <!-- ── ACTOR → USE CASE LINES ── -->

  <!-- User → Register/Login -->
  <line x1="88" y1="110" x2="310" y2="115" stroke="#555" stroke-width="1.2"/>

  <!-- Operator → Configure Run -->
  <line x1="88" y1="372" x2="275" y2="225" stroke="#555" stroke-width="1.2"/>
  <!-- Operator → Save/Download Output -->
  <line x1="88" y1="378" x2="265" y2="370" stroke="#555" stroke-width="1.2"/>
  <!-- Operator → Save Combo Template -->
  <line x1="88" y1="385" x2="265" y2="450" stroke="#555" stroke-width="1.2"/>
  <!-- Operator → View Run History -->
  <line x1="88" y1="390" x2="265" y2="535" stroke="#555" stroke-width="1.2"/>

  <!-- Admin → Add LoRA -->
  <line x1="88" y1="678" x2="485" y2="623" stroke="#555" stroke-width="1.2"/>
  <!-- Admin → Edit LoRA -->
  <line x1="88" y1="685" x2="485" y2="685" stroke="#555" stroke-width="1.2"/>
  <!-- Admin → Delete LoRA -->
  <line x1="88" y1="692" x2="485" y2="748" stroke="#555" stroke-width="1.2"/>

  <!-- ── INCLUDE ARROW: Configure Run → Select Output Format ── -->
  <line x1="505" y1="225" x2="530" y2="268" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#dashed-arrow)"/>
  <text x="535" y="248" font-size="11" fill="#888" font-style="italic">«include»</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="dashed-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
