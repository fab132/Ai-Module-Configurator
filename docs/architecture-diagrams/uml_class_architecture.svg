<svg width="900" height="580" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="580" fill="white"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">AIVP – Software Architecture</text>

  <!-- Domain Model box (left tall rounded rect) -->
  <rect x="30" y="70" width="210" height="400" rx="40" fill="white" stroke="#888" stroke-width="1.5"/>
  <text x="135" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Domain Model</text>
  <text x="135" y="268" text-anchor="middle" font-size="12" fill="#555">SQLAlchemy Entities:</text>
  <text x="135" y="288" text-anchor="middle" font-size="12" fill="#555">User, LoraModel,</text>
  <text x="135" y="308" text-anchor="middle" font-size="12" fill="#555">Combo, ComboItem,</text>
  <text x="135" y="328" text-anchor="middle" font-size="12" fill="#555">RunLog</text>

  <!-- UI Layer box (right top) -->
  <rect x="500" y="70" width="360" height="80" rx="14" fill="white" stroke="#4A7FC1" stroke-width="1.5"/>
  <text x="680" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">UI: NiceGUI pages</text>
  <text x="680" y="128" text-anchor="middle" font-size="12" fill="#555">Login · Register · Main · History · Library</text>

  <!-- Business Logic box (right middle) -->
  <rect x="500" y="240" width="360" height="80" rx="14" fill="white" stroke="#4A7FC1" stroke-width="1.5"/>
  <text x="680" y="276" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Business Logic: Services</text>
  <text x="680" y="298" text-anchor="middle" font-size="12" fill="#555">Auth · JSON Builder · Configurator · LoRA · Combo · History</text>

  <!-- DAO/DB box (right bottom) -->
  <rect x="500" y="410" width="360" height="80" rx="14" fill="white" stroke="#4A7FC1" stroke-width="1.5"/>
  <text x="680" y="446" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">DAO / DB: SQLAlchemy + SQLite</text>
  <text x="680" y="468" text-anchor="middle" font-size="12" fill="#555">database.py · entities.py · init_db()</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- UI uses --> Business Logic (vertical dashed arrow) -->
  <line x1="680" y1="150" x2="680" y2="238" stroke="#555" stroke-width="1" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="692" y="200" font-size="11" fill="#777" font-style="italic">uses</text>

  <!-- Business Logic read/write --> DAO (vertical dashed arrow) -->
  <line x1="680" y1="320" x2="680" y2="408" stroke="#555" stroke-width="1" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="692" y="368" font-size="11" fill="#777" font-style="italic">read / write</text>

  <!-- UI uses --> Domain Model (horizontal dashed arrow pointing LEFT) -->
  <line x1="500" y1="110" x2="242" y2="200" stroke="#555" stroke-width="1" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="355" y="142" font-size="11" fill="#777" font-style="italic">uses</text>

  <!-- Business Logic works with --> Domain Model (horizontal dashed arrow pointing LEFT) -->
  <line x1="500" y1="280" x2="242" y2="280" stroke="#555" stroke-width="1" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="338" y="272" font-size="11" fill="#777" font-style="italic">works with</text>

  <!-- DAO persists --> Domain Model (horizontal dashed arrow pointing LEFT) -->
  <line x1="500" y1="450" x2="242" y2="360" stroke="#555" stroke-width="1" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="338" y="418" font-size="11" fill="#777" font-style="italic">persists</text>

  <!-- External boxes at bottom -->
  <rect x="500" y="518" width="150" height="40" rx="8" fill="#F5F5F5" stroke="#AAA" stroke-width="1"/>
  <text x="575" y="543" text-anchor="middle" font-size="12" fill="#555">ComfyUI API</text>

  <rect x="710" y="518" width="150" height="40" rx="8" fill="#F5F5F5" stroke="#AAA" stroke-width="1"/>
  <text x="785" y="543" text-anchor="middle" font-size="12" fill="#555">Local / Cloud Storage</text>

  <!-- DAO → ComfyUI -->
  <line x1="575" y1="490" x2="575" y2="516" stroke="#AAA" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- DAO → Cloud -->
  <line x1="785" y1="490" x2="785" y2="516" stroke="#AAA" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

</svg>
